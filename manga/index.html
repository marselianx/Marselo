<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>volvar manga reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@100;300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --fg: #ffffff;
            --gray-deep: #0a0a0a;
            --gray-mid: #1a1a1a;
            --gray-light: #888888;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Courier Prime', monospace;
            --ease-cinematic: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        .grain {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.045;
            pointer-events: none;
            z-index: 999;
            animation: grain-jump 0.3s steps(5) infinite;
        }

        @keyframes grain-jump {
            0%, 100% { transform:translate(0, 0); }
            10% { transform:translate(-1%, -1%); }
            30% { transform:translate(-2%, -2%); }
            50% { transform:translate(-1%, 2%); }
            70% { transform:translate(2%, -2%); }
            90% { transform:translate(-2%, 1%); }
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem;
            mix-blend-mode: difference;
        }

        @media (max-width: 768px) {
            main { padding: 2rem; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border: 1px solid var(--fg);
            padding: 0.5rem 1rem;
            transition: all 0.4s var(--ease-cinematic);
            cursor: pointer;
        }

        .brand-logo:hover {
            background-color: var(--fg);
            color: var(--bg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .status-tag {
            font-size: 0.65rem;
            font-family: var(--font-mono);
            letter-spacing: 0.2em;
            color: var(--gray-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--fg);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--fg);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .content-center {
            max-width: 1200px;
            margin: auto 0;
        }

        .title-wrap {
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(3.5rem, 9vw, 9.5rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(120px);
            animation: reveal-up 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
        }

        @keyframes reveal-up {
            to { opacity: 1; transform: translateY(0); }
        }

        .subtext {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: -0.01em;
            color: #d1d1d1;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal-up 1.2s var(--ease-cinematic) forwards 0.8s;
        }

        .countdown-matrix {
            display: flex;
            gap: 3.5rem;
            margin-top: 4rem;
            opacity: 0;
            animation: reveal-up 1.2s var(--ease-cinematic) forwards 1s;
        }

        @media (max-width: 600px) {
            .countdown-matrix { gap: 1.5rem; margin-top: 3rem; }
        }

        .matrix-unit {
            display: flex;
            flex-direction: column;
        }

        .matrix-num {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 100;
            font-family: var(--font-sans);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .matrix-label {
            font-size: 0.6rem;
            font-family: var(--font-mono);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gray-light);
            margin-top: 0.5rem;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .notify-box {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
            width: 100%;
            max-width: 420px;
            transition: border-color 0.4s var(--ease-cinematic);
            opacity: 0;
            animation: reveal-up 1.2s var(--ease-cinematic) forwards 1.2s;
        }

        .notify-box:focus-within {
            border-color: var(--fg);
        }

        .notify-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--fg);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            width: 100%;
            padding-right: 1rem;
        }

        .notify-box input::placeholder {
            color: var(--gray-light);
            font-weight: 300;
        }

        .notify-box button {
            background: none;
            border: none;
            color: var(--fg);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            position: relative;
            transition: color 0.3s var(--ease-cinematic);
        }

        .notify-box button:hover {
            color: var(--gray-light);
        }

        .audio-disclaimer {
            font-size: 0.6rem;
            font-family: var(--font-mono);
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.1em;
            max-width: 260px;
            text-transform: uppercase;
            line-height: 1.5;
            text-align: right;
        }
        @media (max-width: 768px) {
            .audio-disclaimer { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="grain"></div>
    <canvas id="particle-canvas"></canvas>

    <main>
        <header>
            <div class="brand-logo" id="audio-trigger-logo">fartingvolt</div>
            <div class="status-tag">fart</div>
        </header>

        <div class="content-center">
            <div class="title-wrap">
                <h1 id="glitch-title">Coming Soon</h1>
            </div>
            <p class="subtext">even i is more patient than u are bro</p>
            
            <div class="countdown-matrix">
                <div class="matrix-unit">
                    <span class="matrix-num" id="days">00</span>
                    <span class="matrix-label">DAYS</span>
                </div>
                <div class="matrix-unit">
                    <span class="matrix-num" id="hours">00</span>
                    <span class="matrix-label">HRS</span>
                </div>
                <div class="matrix-unit">
                    <span class="matrix-num" id="minutes">00</span>
                    <span class="matrix-label">MINS</span>
                </div>
                <div class="matrix-unit">
                    <span class="matrix-num" id="seconds">00</span>
                    <span class="matrix-label">SECS</span>
                </div>
            </div>
        </div>

        <footer>
            <div class="notify-box">
                <input type="email" placeholder="ENTER YOUR ACCESS EMAIL" id="email-field" autocomplete="off">
                <button id="notify-btn">ACCESS</button>
            </div>
            <div class="audio-disclaimer">
                [ Click anywhere or hover to modulate the systemic synthesized soundscape ]
            </div>
        </footer>
    </main>

    <script>
        let audioCtx = null;
        let mainGainNode = null;
        let ambientOsc = null;
        let ambientFilter = null;

        function initAudio() {
            if (audioCtx) return; 
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGainNode = audioCtx.createGain();
            mainGainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); 
            mainGainNode.connect(audioCtx.destination);

            ambientOsc = audioCtx.createOscillator();
            ambientFilter = audioCtx.createBiquadFilter();
            
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.setValueAtTime(55, audioCtx.currentTime); 
            
            ambientFilter.type = 'lowpass';
            ambientFilter.frequency.setValueAtTime(120, audioCtx.currentTime);
            ambientFilter.Q.setValueAtTime(5, audioCtx.currentTime);

            ambientOsc.connect(ambientFilter);
            ambientFilter.connect(mainGainNode);
            ambientOsc.start();
            
            mainGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            mainGainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 3);
        }

        function playUINodeClick(freq = 150, type = 'sine', duration = 0.4) {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(mainGainNode);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        window.addEventListener('mousemove', (e) => {
            if (!audioCtx || !ambientOsc) return;
            
            const percentX = e.clientX / window.innerWidth;
            const targetCutoff = 80 + (percentX * 220); 
            ambientFilter.frequency.setTargetAtTime(targetCutoff, audioCtx.currentTime, 0.1);


            const percentY = e.clientY / window.innerHeight;
            const targetPitch = 50 + ((1 - percentY) * 15);
            ambientOsc.frequency.setTargetAtTime(targetPitch, audioCtx.currentTime, 0.2);
        });


        window.addEventListener('click', () => {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 130 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 20) + 5;
                this.alpha = Math.random() * 0.4 + 0.1;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;
                    
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 15;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 15;
                    }
                }
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 7000);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        initParticles();
        animateParticles();
        window.addEventListener('resize', initParticles);


        const targetDate = new Date().getTime() + (60 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            
            const secEl = document.getElementById('seconds');
            const oldSec = secEl.innerText;
            const newSec = String(s).padStart(2, '0');
            
            if (oldSec !== newSec) {
                secEl.innerText = newSec;
                if(audioCtx && audioCtx.state === 'running') {
                    playUINodeClick(80, 'sine', 0.04);
                }
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        const notifyBtn = document.getElementById('notify-btn');
        const emailField = document.getElementById('email-field');
        const logo = document.getElementById('audio-trigger-logo');

        notifyBtn.addEventListener('mouseenter', () => playUINodeClick(220, 'triangle', 0.15));
        emailField.addEventListener('focus', () => playUINodeClick(300, 'sine', 0.08));
        logo.addEventListener('mouseenter', () => playUINodeClick(90, 'sawtooth', 0.5));

        notifyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(emailField.value.trim() !== "") {
                playUINodeClick(440, 'triangle', 0.8);
                alert("onyx onyx onyx sahuuuurrr.");
                emailField.value = "";
            } else {
                playUINodeClick(110, 'sawtooth', 0.3);
                emailField.focus();
            }
        });
    </script>
</body>
</html>
