<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MangaShelf</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #e8473f;
      --accent2: #f07f3c;
      --text: #e8e8f0;
      --muted: #888899;
      --border: #2e2e3e;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
      cursor: pointer;
    }

    .logo span { color: var(--text); }

    .search-bar {
      flex: 1;
      max-width: 500px;
      display: flex;
      gap: 8px;
    }

    .search-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 7px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 16px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* MAIN */
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
    }

    /* MANGA GRID */
    .manga-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .manga-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid var(--border);
    }

    .manga-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border-color: var(--accent);
    }

    .manga-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .manga-card .card-info {
      padding: 10px;
    }

    .manga-card .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .manga-card .card-status {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: capitalize;
    }

    /* MANGA DETAIL VIEW */
    #detail-view { display: none; }

    .detail-header {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }

    .detail-cover {
      width: 160px;
      flex-shrink: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .detail-cover img {
      width: 100%;
      display: block;
    }

    .detail-info { flex: 1; }

    .detail-title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .detail-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .detail-desc {
      font-size: 0.88rem;
      color: #aaa;
      line-height: 1.6;
      max-height: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.7rem;
      padding: 2px 8px;
      color: var(--muted);
      margin: 2px;
    }

    /* CHAPTER LIST */
    .chapter-list {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .chapter-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      gap: 12px;
    }

    .chapter-item:last-child { border-bottom: none; }
    .chapter-item:hover { background: var(--surface2); }

    .chapter-item .ch-num {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .chapter-item .ch-title {
      flex: 1;
      font-size: 0.82rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item .ch-date {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* READER VIEW */
    #reader-view { display: none; }

    .reader-nav {
      position: sticky;
      top: 56px;
      background: rgba(15,15,19,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }

    .reader-title {
      flex: 1;
      font-size: 0.88rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reader-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .reader-pages img {
      width: 100%;
      max-width: 800px;
      display: block;
      border-radius: 2px;
    }

    /* LOADING / STATUS */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 48px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
      margin-bottom: 20px;
    }
    .back-btn:hover { color: var(--text); }

    .error-msg {
      background: rgba(232, 71, 63, 0.1);
      border: 1px solid rgba(232, 71, 63, 0.3);
      border-radius: var(--radius);
      color: #f08080;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .detail-header { flex-direction: column; }
      .detail-cover { width: 120px; }
      .manga-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">Manga<span>Shelf</span></div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search manga..." onkeydown="if(event.key==='Enter') doSearch()" />
    <button class="btn" onclick="doSearch()">Search</button>
  </div>
</header>

<main>

  <!-- HOME VIEW -->
  <div id="home-view">
    <div id="home-content">
      <div class="empty-state">
        <div class="big">📚</div>
        <p>Search for a manga to get started</p>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <button class="back-btn" onclick="goHome()">← Back to results</button>
    <div id="detail-content"></div>
  </div>

  <!-- READER VIEW -->
  <div id="reader-view">
    <div class="reader-nav">
      <button class="btn btn-ghost" style="padding:5px 12px" onclick="closeReader()">← Back</button>
      <span class="reader-title" id="reader-label">—</span>
      <button class="btn btn-ghost" style="padding:5px 12px" id="prev-ch-btn" onclick="changeChapter(-1)">‹ Prev</button>
      <button class="btn btn-ghost" style="padding:5px 12px" id="next-ch-btn" onclick="changeChapter(1)">Next ›</button>
    </div>
    <div class="reader-pages" id="reader-pages"></div>
  </div>

</main>

<script>
  const PROXY = 'https://api.mangadex.org';
  const COVER_BASE = 'https://uploads.mangadex.org/covers';

  let state = {
    view: 'home',       // home | detail | reader
    results: [],
    currentManga: null,
    chapters: [],
    currentChapterIndex: 0,
    searchQuery: '',
    page: 0,
  };

  /* ── VIEW SWITCHING ── */
  function showView(name) {
    document.getElementById('home-view').style.display = name === 'home' ? '' : 'none';
    document.getElementById('detail-view').style.display = name === 'detail' ? '' : 'none';
    document.getElementById('reader-view').style.display = name === 'reader' ? '' : 'none';
    state.view = name;
  }

  function goHome() {
    showView('home');
    if (state.results.length) renderResults(state.results);
  }

  /* ── SEARCH ── */
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    state.searchQuery = q;
    state.page = 0;
    showView('home');
    setHomeContent('<div class="spinner"></div>');
    try {
      const data = await fetchJSON(`${PROXY}/manga?title=${encodeURIComponent(q)}&limit=24&offset=0&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive`);
      state.results = data.data || [];
      renderResults(state.results);
    } catch(e) {
      setHomeContent(`<div class="error-msg">Failed to fetch results. MangaDex might be rate-limiting. Try again in a moment.</div>`);
    }
  }

  function renderResults(list) {
    if (!list.length) {
      setHomeContent('<div class="empty-state"><div class="big">🔍</div><p>No results found.</p></div>');
      return;
    }
    let html = `<h2>Results</h2><div class="manga-grid">`;
    for (const m of list) {
      const title = getTitle(m);
      const status = m.attributes.status || '';
      const coverUrl = getCoverUrl(m);
      html += `
        <div class="manga-card" onclick="openManga('${m.id}')">
          <img src="${coverUrl}" alt="${escHtml(title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'150\\' height=\\'225\\'><rect fill=\\'%231a1a22\\' width=\\'150\\' height=\\'225\\'/><text x=\\'75\\' y=\\'112\\' fill=\\'%23555\\' text-anchor=\\'middle\\' font-size=\\'40\\'>📖</text></svg>'" />
          <div class="card-info">
            <div class="card-title">${escHtml(title)}</div>
            <div class="card-status">${status}</div>
          </div>
        </div>`;
    }
    html += '</div>';
    setHomeContent(html);
  }

  /* ── MANGA DETAIL ── */
  async function openManga(id) {
    showView('detail');
    document.getElementById('detail-content').innerHTML = '<div class="spinner"></div>';
    try {
      const [mangaRes, chaptersRes] = await Promise.all([
        fetchJSON(`${PROXY}/manga/${id}?includes[]=cover_art`),
        fetchJSON(`${PROXY}/manga/${id}/feed?limit=100&translatedLanguage[]=en&order[chapter]=desc&contentRating[]=safe&contentRating[]=suggestive`)
      ]);
      state.currentManga = mangaRes.data;
      state.chapters = (chaptersRes.data || []).sort((a, b) => parseFloat(a.attributes.chapter || 0) - parseFloat(b.attributes.chapter || 0));
      renderDetail();
    } catch(e) {
      document.getElementById('detail-content').innerHTML = `<div class="error-msg">Could not load manga details. ${e.message}</div>`;
    }
  }

  function renderDetail() {
    const m = state.currentManga;
    const title = getTitle(m);
    const desc = (m.attributes.description?.en || 'No description available.').slice(0, 600);
    const cover = getCoverUrl(m);
    const status = m.attributes.status || 'Unknown';
    const year = m.attributes.year || '';
    const tags = (m.attributes.tags || []).slice(0, 8).map(t => `<span class="tag">${escHtml(t.attributes.name.en)}</span>`).join('');

    let chapHtml = '';
    if (!state.chapters.length) {
      chapHtml = '<p style="color:var(--muted);padding:16px">No English chapters found.</p>';
    } else {
      chapHtml = `<div class="chapter-list">`;
      for (let i = 0; i < state.chapters.length; i++) {
        const ch = state.chapters[i];
        const num = ch.attributes.chapter ? `Ch. ${ch.attributes.chapter}` : 'Oneshot';
        const chTitle = ch.attributes.title || '';
        const date = ch.attributes.publishAt ? new Date(ch.attributes.publishAt).toLocaleDateString() : '';
        chapHtml += `
          <div class="chapter-item" onclick="openChapter(${i})">
            <span class="ch-num">${escHtml(num)}</span>
            <span class="ch-title">${escHtml(chTitle)}</span>
            <span class="ch-date">${date}</span>
          </div>`;
      }
      chapHtml += '</div>';
    }

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-header">
        <div class="detail-cover"><img src="${cover}" alt="${escHtml(title)}" /></div>
        <div class="detail-info">
          <div class="detail-title">${escHtml(title)}</div>
          <div class="detail-meta">
            <span>Status: ${status}</span>
            ${year ? `<span>Year: ${year}</span>` : ''}
            <span>${state.chapters.length} English chapter${state.chapters.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="detail-desc">${escHtml(desc)}</div>
          <div>${tags}</div>
        </div>
      </div>
      <h2>Chapters</h2>
      ${chapHtml}
    `;
  }

  /* ── READER ── */
  async function openChapter(index) {
    state.currentChapterIndex = index;
    showView('reader');
    const ch = state.chapters[index];
    const num = ch.attributes.chapter ? `Ch. ${ch.attributes.chapter}` : 'Oneshot';
    const mangaTitle = getTitle(state.currentManga);
    document.getElementById('reader-label').textContent = `${mangaTitle} — ${num}`;
    document.getElementById('reader-pages').innerHTML = '<div class="spinner"></div>';
    document.getElementById('prev-ch-btn').disabled = index === 0;
    document.getElementById('next-ch-btn').disabled = index === state.chapters.length - 1;

    try {
      const data = await fetchJSON(`${PROXY}/at-home/server/${ch.id}`);
      const { baseUrl, chapter: { hash, data: pages } } = data;
      let html = '';
      for (const page of pages) {
        html += `<img src="${baseUrl}/data/${hash}/${page}" loading="lazy" alt="page" />`;
      }
      document.getElementById('reader-pages').innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:32px">No pages found.</p>';
    } catch(e) {
      document.getElementById('reader-pages').innerHTML = `<div class="error-msg">Failed to load chapter pages. ${e.message}</div>`;
    }

    window.scrollTo(0, 0);
  }

  function closeReader() {
    showView('detail');
  }

  function changeChapter(dir) {
    const next = state.currentChapterIndex + dir;
    if (next >= 0 && next < state.chapters.length) openChapter(next);
  }

  /* ── HELPERS ── */
  function setHomeContent(html) {
    document.getElementById('home-content').innerHTML = html;
  }

  function getTitle(m) {
    return m.attributes.title?.en || Object.values(m.attributes.title || {})[0] || 'Unknown Title';
  }

  function getCoverUrl(m) {
    const rel = (m.relationships || []).find(r => r.type === 'cover_art');
    if (!rel?.attributes?.fileName) return '';
    return `${COVER_BASE}/${m.id}/${rel.attributes.fileName}.256.jpg`;
  }

  async function fetchJSON(url) {
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
