<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple MangaDex Reader</title>
  <style>
    :root {
      --bg-color: #121212;
      --panel-color: #1e1e1e;
      --accent-color: #ff6740;
      --text-color: #ffffff;
      --text-muted: #aaaaaa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      color: var(--accent-color);
      margin-bottom: 5px;
    }

    /* Search Component */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    input, select, button {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: var(--panel-color);
      color: var(--text-color);
      font-size: 1rem;
    }

    input {
      flex-grow: 1;
    }

    button {
      background: var(--accent-color);
      cursor: pointer;
      font-weight: bold;
      border: none;
    }

    button:hover {
      opacity: 0.9;
    }

    /* Results Layout */
    .manga-card {
      display: flex;
      gap: 20px;
      background: var(--panel-color);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .manga-cover {
      width: 120px;
      height: 170px;
      object-fit: cover;
      background-color: #333;
      border-radius: 4px;
    }

    .manga-info {
      flex-grow: 1;
    }

    .manga-title {
      margin: 0 0 10px 0;
      color: var(--accent-color);
    }

    .manga-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-height: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    /* Reader View */
    .reader-area {
      margin-top: 30px;
    }

    .page-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    .manga-page {
      max-width: 100%;
      height: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .loading {
      text-align: center;
      color: var(--accent-color);
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>MangaDex API Reader</h1>
      <p style="color: var(--text-muted);">Quickly search manga and stream pages using MangaDex@Home</p>
    </header>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search manga title (e.g., Frieren, Naruto)..." value="Frieren">
      <select id="qualitySelect">
        <option value="original">Original (High Quality)</option>
        <option value="saver">Data Saver (Mobile)</option>
      </select>
      <button id="searchBtn">Search & Read</button>
    </div>

    <div id="loadingStatus" class="loading">Processing pipeline... Please wait.</div>

    <div id="mangaDetails"></div>
    <div id="readerArea" class="reader-area">
      <h3 id="chapterTitle" style="display:none; border-bottom: 2px solid var(--panel-color); padding-bottom: 10px;"></h3>
      <div id="pageContainer" class="page-container"></div>
    </div>
  </div>

  <script>
    /**
     * MangaDex API v5 Integration Client Object
     */
    class MangaDexClient {
      constructor() {
        this.baseUrl = 'https://mangadex.org';
      }

      async searchManga(title) {
        const url = new URL(`${this.baseUrl}/manga`);
        url.searchParams.append('title', title);
        url.searchParams.append('includes[]', 'cover_art');
        url.searchParams.append('availableTranslatedLanguage[]', 'en');

        const response = await fetch(url);
        if (!response.ok) throw new Error('Search failed');
        const payload = await response.json();
        return (payload.data || []).map(manga => this._normalizeManga(manga));
      }

      async getChapterFeed(mangaId) {
        const url = new URL(`${this.baseUrl}/manga/${mangaId}/feed`);
        url.searchParams.append('translatedLanguage[]', 'en');
        url.searchParams.append('order[chapter]', 'asc'); // Chronological progression

        const response = await fetch(url);
        if (!response.ok) throw new Error('Feed lookup failed');
        const payload = await response.json();
        return payload.data || [];
      }

      async getChapterPages(chapterId, useDataSaver = false) {
        const response = await fetch(`${this.baseUrl}/at-home/server/${chapterId}`);
        if (!response.ok) throw new Error('@Home configuration target error');
        const payload = await response.json();
        
        const baseUrl = payload.baseUrl;
        const hash = payload.chapter?.hash;
        const fileArray = useDataSaver ? payload.chapter?.dataSaver : payload.chapter?.data;
        const modePath = useDataSaver ? 'data-saver' : 'data';

        if (!baseUrl || !hash || !fileArray) throw new Error('Malformed payload');

        return fileArray.map(fileName => `${baseUrl}/${modePath}/${hash}/${fileName}`);
      }

      _normalizeManga(manga) {
        const id = manga.id;
        const attributes = manga.attributes || {};
        const title = attributes.title?.en || Object.values(attributes.title || {})[0] || 'Unknown Title';
        const coverRel = (manga.relationships || []).find(rel => rel.type === 'cover_art');
        const fileName = coverRel?.attributes?.fileName;

        return {
          id,
          title,
          description: attributes.description?.en || 'No description found.',
          coverUrl: fileName ? `${this.baseUrl}/covers/${id}/${fileName}` : null
        };
      }
    }

    // Initialize Global App Core
    const api = new MangaDexClient();

    // DOM Target Elements
    const searchInput = document.getElementById('searchInput');
    const qualitySelect = document.getElementById('qualitySelect');
    const searchBtn = document.getElementById('searchBtn');
    const loadingStatus = document.getElementById('loadingStatus');
    const mangaDetails = document.getElementById('mangaDetails');
    const chapterTitle = document.getElementById('chapterTitle');
    const pageContainer = document.getElementById('pageContainer');

    searchBtn.addEventListener('click', async () => {
      const query = searchInput.value.trim();
      if (!query) return;

      // Reset DOM state
      loadingStatus.style.display = 'block';
      mangaDetails.innerHTML = '';
      pageContainer.innerHTML = '';
      chapterTitle.style.display = 'none';

      try {
        // Step 1: Query & Fetch Matching Manga metadata 
        const mangaList = await api.searchManga(query);
        if (mangaList.length === 0) {
          mangaDetails.innerHTML = '<p>No English-translated results found matching that criteria.</p>';
          loadingStatus.style.display = 'none';
          return;
        }

        const targetManga = mangaList[0];
        
        // Render Meta Info Card
        mangaDetails.innerHTML = `
          <div class="manga-card">
            <img class="manga-cover" src="${targetManga.coverUrl || ''}" alt="Cover">
            <div class="manga-info">
              <h2 class="manga-title">${targetManga.title}</h2>
              <p class="manga-desc">${targetManga.description}</p>
            </div>
          </div>
        `;

        // Step 2: Grab the Chronological Chapter Feed
        const feed = await api.getChapterFeed(targetManga.id);
        if (feed.length === 0) {
          chapterTitle.innerText = "No readable English chapters verified.";
          chapterTitle.style.display = 'block';
          loadingStatus.style.display = 'none';
          return;
        }

        const baselineChapter = feed[0];
        chapterTitle.innerText = `Reading: Ch. ${baselineChapter.attributes.chapter} ${baselineChapter.attributes.title ? `- "${baselineChapter.attributes.title}"` : ''}`;
        chapterTitle.style.display = 'block';

        // Step 3: Stream and build pages through @Home
        const useSaver = qualitySelect.value === 'saver';
        const pages = await api.getChapterPages(baselineChapter.id, useSaver);

        // Render fully resolved pages down sequential stack
        pages.forEach((pageUrl, index) => {
          const img = document.createElement('img');
          img.src = pageUrl;
          img.className = 'manga-page';
          img.alt = `Page ${index + 1}`;
          img.loading = 'lazy'; // Browser optimization step
          pageContainer.appendChild(img);
        });

      } catch (error) {
        console.error(error);
        mangaDetails.innerHTML = `<p style="color: red;">An error occurred resolving assets: ${error.message}</p>`;
      } finally {
        loadingStatus.style.display = 'none';
      }
    });
  </script>
</body>
</html>
