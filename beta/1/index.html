<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS // ANIM — Next-Gen Stream Core</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-base: #06070d;
    --bg-surface: #0c0e17;
    --bg-element: #141829;
    --border: #1f2642;
    --accent: #00ffcc;
    --accent-glow: rgba(0, 255, 204, 0.25);
    --accent-alt: #ff007f;
    --text-primary: #f1f3f9;
    --text-muted: #7884a4;
    
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  [data-theme="cyber-punk"] {
    --bg-base: #0b001a;
    --bg-surface: #14002e;
    --bg-element: #240046;
    --border: #ff007f;
    --accent: #ffff00;
    --accent-glow: rgba(255, 255, 0, 0.3);
    --text-primary: #ffffff;
    --text-muted: #9d4edd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s var(--ease-out-expo);
  }

  .display-font { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

  /* App Bar */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 4vw; background: rgba(6, 7, 13, 0.75);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .brand-logo {
    width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent-alt));
    border-radius: 6px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
  }
  .brand-logo svg { transform: rotate(-45deg); color: #000; width: 16px; height: 16px; }
  .brand-name { font-size: 22px; text-transform: uppercase; color: var(--text-primary); }
  .brand-name span { color: var(--accent); }

  .search-wrapper { position: relative; width: 320px; }
  .search-wrapper input {
    width: 100%; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 30px; padding: 12px 16px 12px 42px; color: var(--text-primary);
    font-size: 14px; transition: all 0.3s;
  }
  .search-wrapper input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
  .search-wrapper svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted); }

  .actions-group { display: flex; align-items: center; gap: 12px; }
  .btn-icon {
    background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);
    width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-icon:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); color: var(--accent); }

  /* Navigation Tabs */
  .navigation-tabs { display: flex; justify-content: center; gap: 12px; margin: 32px 4vw 0 4vw; }
  .tab-node {
    background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-muted);
    padding: 10px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s;
  }
  .tab-node:hover, .tab-node.active { color: var(--text-primary); border-color: var(--accent); background: var(--bg-element); }

  /* Grid Layouts */
  .main-container { padding: 40px 4vw; }
  .shelf-section { margin-bottom: 56px; }
  .shelf-title { font-size: 28px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
  .shelf-title span { color: var(--accent); }

  .nexus-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 28px;
  }

  /* Anime Card Re-imagined */
  .nexus-card {
    position: relative; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3;
    transition: all 0.4s var(--ease-out-expo);
  }
  .nexus-card:hover {
    transform: translateY(-8px) scale(1.02); border-color: var(--accent);
    box-shadow: 0 16px 32px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
  }
  .nexus-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
  .nexus-card:hover img { transform: scale(1.05); }

  .card-glass {
    position: absolute; inset: 0; background: linear-gradient(to top, #06070d 0%, rgba(6,7,13,0.3) 60%, transparent 100%);
    padding: 20px; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .card-meta-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 6px; }
  .card-meta-tags { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }

  .badge-score {
    position: absolute; top: 12px; left: 12px; background: rgba(6,7,13,0.85);
    border: 1px solid var(--border); padding: 4px 8px; border-radius: 8px;
    font-size: 12px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 4px;
  }

  /* Theater Streaming Layout */
  .theater-workspace { display: grid; grid-template-columns: 1fr 340px; gap: 32px; padding: 40px 4vw; }
  @media(max-width: 1100px) { .theater-workspace { grid-template-columns: 1fr; } }

  .player-container {
    position: relative; aspect-ratio: 16/9; background: #000; border-radius: 20px;
    overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .player-container iframe { width: 100%; height: 100%; border: none; }

  .control-strip {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-surface); border: 1px solid var(--border);
    padding: 16px 24px; border-radius: 16px; margin-top: 16px; gap: 16px; flex-wrap: wrap;
  }
  
  .btn-prime {
    background: var(--accent); color: #000; border: none; padding: 12px 24px;
    border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-prime:hover { opacity: 0.9; transform: scale(1.02); }

  .provider-matrix { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .provider-pill {
    background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-muted);
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .provider-pill.active { border-color: var(--accent); color: var(--accent); background: var(--bg-element); }

  .sidebar-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; height: fit-content; }
  .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .mode-btn {
    background: var(--bg-base); border: 1px solid var(--border); color: var(--text-muted);
    padding: 10px; text-align: center; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .episode-scroller { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; max-height: 320px; overflow-y: auto; }
  .ep-chip {
    background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary);
    padding: 12px 0; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .ep-chip.active { background: var(--accent-alt); border-color: var(--accent-alt); color: #fff; }

  /* Profile Flyout/Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(3, 4, 7, 0.9); z-index: 500;
    display: none; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }
  .modal-window {
    background: var(--bg-surface); border: 1px solid var(--border); width: 100%; max-width: 640px;
    border-radius: 24px; overflow: hidden; position: relative; padding: 32px;
  }
  .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); cursor: pointer; }

  /* Utilities */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-surface) 25%, var(--border) 50%, var(--bg-surface) 75%);
    background-size: 200% 100%; animation: loadingShimmer 1.4s infinite linear; border-radius: 16px; aspect-ratio: 2/3;
  }
  @keyframes loadingShimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
</style>
</head>
<body>

<header>
  <div class="brand" id="brand-home">
    <div class="brand-logo"><i data-lucide="zap"></i></div>
    <h1 class="brand-name display-font">NEXUS // <span>ANIM</span></h1>
  </div>

  <div class="search-wrapper">
    <i data-lucide="search"></i>
    <input type="text" id="global-search" placeholder="Query tracking index...">
  </div>

  <div class="actions-group">
    <button class="btn-icon" id="watchlist-toggle" title="Watchlist"><i data-lucide="bookmark"></i></button>
    <button class="btn-icon" id="theme-toggle" title="Toggle Protocol"><i data-lucide="sliders"></i></button>
  </div>
</header>

<div class="navigation-tabs">
  <button class="tab-node active" data-feed="trending">Trending Matrix</button>
  <button class="tab-node" data-feed="popular">All-Time Popular</button>
  <button class="tab-node" data-feed="watchlist">Your Watchlist</button>
</div>

<!-- Main Feed Container -->
<main class="main-container" id="view-catalog">
  <section class="shelf-section">
    <h2 class="shelf-title display-font" id="catalog-headline">System Feed: <span>Trending</span></h2>
    <div class="nexus-grid" id="catalog-grid"></div>
  </section>
</main>

<!-- Stream Engine Workspace -->
<div class="theater-workspace" id="view-theater" style="display: none;">
  <div>
    <button class="btn-prime" id="leave-theater" style="margin-bottom: 24px; background: var(--bg-surface); color: #fff; border: 1px solid var(--border)">
      ← Abort Theater Mode
    </button>
    
    <div class="player-container">
      <iframe id="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="control-strip">
      <div>
        <h2 class="display-font" id="stream-title" style="font-size: 26px;">Anime Title</h2>
        <p id="stream-studio" style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Studio Profile</p>
      </div>
      <button class="btn-prime" id="bookmark-stream-btn"><i data-lucide="bookmark" style="width:16px; inline-size: 16px;"></i> Bookmark</button>
    </div>

    <div class="provider-matrix" id="provider-row">
      <button class="provider-pill active" data-prov="vidhide">Vidhide (Anikoto Main)</button>
      <button class="provider-pill" data-prov="streamwish">Streamwish</button>
      <button class="provider-pill" data-prov="filemoon">Filemoon</button>
      <button class="provider-pill" data-prov="voe">Voe Mirror</button>
    </div>
  </div>

  <div class="sidebar-panel">
    <h4 class="display-font" style="margin-bottom: 12px; font-size: 18px;">Audio Pipeline</h4>
    <div class="mode-selector">
      <button class="mode-btn active" id="mode-sub">SUBTITLED</button>
      <button class="mode-btn" id="mode-dub">DUBBED</button>
    </div>

    <h4 class="display-font" style="margin-bottom: 12px; font-size: 18px;">Index Mapping</h4>
    <div class="episode-scroller" id="episode-grid"></div>
  </div>
</div>

<!-- Media Info Modal Details -->
<div class="modal-overlay" id="info-modal">
  <div class="modal-window">
    <button class="close-modal" id="modal-close-btn"><i data-lucide="x"></i></button>
    <div id="modal-content-target"></div>
  </div>
</div>

<script>
// State Core Matrix
let state = {
  currentFeed: 'trending',
  activeAnime: null,
  activeEpisode: 1,
  activeAudio: 'sub',
  activeProvider: 'vidhide',
  watchlist: JSON.parse(localStorage.getItem('nexus_watchlist')) || []
};

const graphqlQuery = `
query ($search: String, $sort: [MediaSort]) {
  Page(page: 1, perPage: 24) {
    media(search: $search, type: ANIME, sort: $sort) {
      id
      title { english romaji }
      description
      coverImage { large }
      averageScore
      episodes
      genres
      studios(isMain: true) { nodes { name } }
    }
  }
}`;

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  initListeners();
  loadFeed(state.currentFeed);
});

function initListeners() {
  document.getElementById('brand-home').addEventListener('click', exitTheater);
  
  document.querySelectorAll('.navigation-tabs .tab-node').forEach(tab => {
    tab.addEventListener('click', (e) => {
      document.querySelectorAll('.navigation-tabs .tab-node').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.currentFeed = tab.dataset.feed;
      loadFeed(state.currentFeed);
    });
  });

  // Search execution via debounce
  let searchDebounce;
  document.getElementById('global-search').addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    const query = e.target.value.trim();
    searchDebounce = setTimeout(() => {
      if(query.length > 2) {
        exitTheater();
        executeSearch(query);
      } else if(query.length === 0) {
        loadFeed(state.currentFeed);
      }
    }, 400);
  });

  // Stream controls listeners
  document.getElementById('leave-theater').addEventListener('click', exitTheater);
  document.getElementById('mode-sub').addEventListener('click', () => setAudio('sub'));
  document.getElementById('mode-dub').addEventListener('click', () => setAudio('dub'));
  
  document.querySelectorAll('#provider-row .provider-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('#provider-row .provider-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      state.activeProvider = pill.dataset.prov;
      mountVideoSource();
    });
  });

  document.getElementById('bookmark-stream-btn').addEventListener('click', () => {
    toggleWatchlistElement(state.activeAnime);
  });

  document.getElementById('modal-close-btn').addEventListener('click', () => {
    document.getElementById('info-modal').classList.remove('active');
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    if(currentTheme === 'cyber-punk') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', 'cyber-punk');
    }
  });

  document.getElementById('watchlist-toggle').addEventListener('click', () => {
    document.querySelector('[data-feed="watchlist"]').click();
  });
}

async function requestGateway(variables) {
  try {
    const res = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: graphqlQuery, variables })
    });
    const parsed = await res.json();
    return parsed?.data?.Page?.media || [];
  } catch(e) {
    console.error("Pipeline failure fetching dynamic feed node configuration", e);
    return [];
  }
}

function showSkeletons() {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = Array.from({length: 12}).map(() => `<div class="skeleton"></div>`).join('');
}

async function loadFeed(feedType) {
  exitTheater();
  showSkeletons();
  
  let dataset = [];
  const headline = document.getElementById('catalog-headline');

  if (feedType === 'trending') {
    headline.innerHTML = `System Feed: <span>Trending Matrix</span>`;
    dataset = await requestGateway({ sort: ["TRENDING_DESC"] });
  } else if (feedType === 'popular') {
    headline.innerHTML = `System Feed: <span>All-Time Popular</span>`;
    dataset = await requestGateway({ sort: ["POPULARITY_DESC"] });
  } else if (feedType === 'watchlist') {
    headline.innerHTML = `System Feed: <span>Your Watchlist Storage</span>`;
    dataset = state.watchlist;
  }

  renderGridItems(dataset);
}

async function executeSearch(queryStr) {
  showSkeletons();
  document.getElementById('catalog-headline').innerHTML = `Search Output: <span>"${queryStr}"</span>`;
  const dataset = await requestGateway({ search: queryStr });
  renderGridItems(dataset);
}

function renderGridItems(items) {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = '';

  if(!items || items.length === 0) {
    grid.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-muted); padding: 48px 0; text-align: center;">No active array objects indexable right now.</div>`;
    return;
  }

  items.forEach(anime => {
    const card = document.createElement('div');
    card.className = 'nexus-card';
    const cleanTitle = anime.title.english || anime.title.romaji;
    const rating = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : '??';

    card.innerHTML = `
      <div class="badge-score"><i data-lucide="star" style="width:12px;height:12px;fill:currentColor;"></i> ${rating}</div>
      <img src="${anime.coverImage.large}" alt="Image Frame" loading="lazy">
      <div class="card-glass">
        <h3 class="card-meta-title">${cleanTitle}</h3>
        <div class="card-meta-tags">
          <span>${anime.genres?.[0] || 'Unknown'}</span>
          <span>${anime.episodes || '??'} Index Encoders</span>
        </div>
      </div>
    `;

    card.addEventListener('click', () => deployInfoModal(anime));
    grid.appendChild(card);
  });
  lucide.createIcons();
}

function deployInfoModal(anime) {
  const modal = document.getElementById('info-modal');
  const target = document.getElementById('modal-content-target');
  const cleanTitle = anime.title.english || anime.title.romaji;
  
  const isBookmarked = state.watchlist.some(x => x.id === anime.id);

  target.innerHTML = `
    <div style="display: grid; grid-template-columns: 160px 1fr; gap: 24px;">
      <img src="${anime.coverImage.large}" style="width: 100%; border-radius: 12px; border: 1px solid var(--border);" />
      <div>
        <h2 class="display-font" style="font-size: 24px; margin-bottom: 8px;">${cleanTitle}</h2>
        <div style="display:flex; gap:8px; margin-bottom: 12px;">
          <span style="background: var(--bg-element); font-size:11px; padding:4px 8px; border-radius:4px; border:1px solid var(--border); color:var(--accent);">${anime.studios?.nodes?.[0]?.name || 'Independent'}</span>
        </div>
        <p style="color: var(--text-muted); font-size: 13.5px; line-height: 1.6; max-height: 120px; overflow-y:auto; margin-bottom: 20px;">
          ${anime.description ? anime.description.replace(/<[^>]*>/g, '') : 'No telemetry summary recorded.'}
        </p>
        <div style="display: flex; gap: 10px;">
          <button class="btn-prime" id="modal-start-stream">Load Stream Pipeline</button>
          <button class="btn-prime" id="modal-fav-toggle" style="background: var(--bg-element); color: #fff; border: 1px solid var(--border)">
            ${isBookmarked ? 'Drop Bookmark' : 'Save Array Node'}
          </button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('modal-start-stream').addEventListener('click', () => {
    modal.classList.remove('active');
    enterTheaterMode(anime);
  });

  document.getElementById('modal-fav-toggle').addEventListener('click', () => {
    toggleWatchlistElement(anime);
    deployInfoModal(anime); // Refresh modal view state
  });

  modal.classList.add('active');
}

function toggleWatchlistElement(anime) {
  const idx = state.watchlist.findIndex(x => x.id === anime.id);
  if(idx > -1) {
    state.watchlist.splice(idx, 1);
  } else {
    state.watchlist.push(anime);
  }
  localStorage.setItem('nexus_watchlist', JSON.stringify(state.watchlist));
  updateWatchlistButtonState();
  if(state.currentFeed === 'watchlist') loadFeed('watchlist');
}

function updateWatchlistButtonState() {
  if(!state.activeAnime) return;
  const isBookmarked = state.watchlist.some(x => x.id === state.activeAnime.id);
  const btn = document.getElementById('bookmark-stream-btn');
  if(isBookmarked) {
    btn.style.background = 'var(--accent-alt)';
    btn.style.color = '#fff';
    btn.innerHTML = `<i data-lucide="check"></i> In Watchlist`;
  } else {
    btn.style.background = 'var(--accent)';
    btn.style.color = '#000';
    btn.innerHTML = `<i data-lucide="bookmark"></i> Bookmark`;
  }
  lucide.createIcons();
}

function enterTheaterMode(anime) {
  state.activeAnime = anime;
  state.activeEpisode = 1;
  
  document.getElementById('view-catalog').style.display = 'none';
  document.getElementById('view-theater').style.display = 'grid';
  window.scrollTo({top: 0, behavior: 'smooth'});

  document.getElementById('stream-title').innerText = anime.title.english || anime.title.romaji;
  document.getElementById('stream-studio').innerText = `${anime.studios?.nodes?.[0]?.name || 'Generic Studio Matrix'} // ${anime.genres?.[0] || 'Core Module'}`;
  
  updateWatchlistButtonState();
  buildEpisodeGrid(anime.episodes || 12);
  mountVideoSource();
}

function buildEpisodeGrid(count) {
  const target = document.getElementById('episode-grid');
  target.innerHTML = '';
  for(let i = 1; i <= count; i++) {
    const chip = document.createElement('div');
    chip.className = `ep-chip ${i === state.activeEpisode ? 'active' : ''}`;
    chip.innerText = i;
    chip.addEventListener('click', () => {
      document.querySelectorAll('#episode-grid .ep-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.activeEpisode = i;
      mountVideoSource();
    });
    target.appendChild(chip);
  }
}

function setAudio(type) {
  state.activeAudio = type;
  document.getElementById('mode-sub').className = `mode-btn ${type === 'sub' ? 'active' : ''}`;
  document.getElementById('mode-dub').className = `mode-btn ${type === 'dub' ? 'active' : ''}`;
  mountVideoSource();
}

function mountVideoSource() {
  let baseDomain = "https://vidhidepro.com/embed";
  if(state.activeProvider === 'streamwish') baseDomain = "https://streamwish.to/e";
  else if(state.activeProvider === 'filemoon') baseDomain = "https://filemoon.sx/e";
  else if(state.activeProvider === 'voe') baseDomain = "https://voe.sx/e";

  const generatedRoute = `${baseDomain}/${state.activeAnime.id}?ep=${state.activeEpisode}&lang=${state.activeAudio}&autoplay=1`;
  document.getElementById('video-frame').src = generatedRoute;
}

function exitTheater() {
  document.getElementById('view-theater').style.display = 'none';
  document.getElementById('view-catalog').style.display = 'block';
  document.getElementById('video-frame').src = '';
  state.activeAnime = null;
}
</script>
</body>
</html>
